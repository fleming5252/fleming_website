<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attached Logo Armillary 3D Loader with 7 Rings</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: sans-serif;
      background-color: #f4f6f9;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    /* --- LOADER CONTAINER --- */
    .loader-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: #0b5fa5; 
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      opacity: 1;
      transition: opacity 0.5s ease, visibility 0.5s ease;
      perspective: 1000px;
    }

    .loader-container.hidden {
      opacity: 0;
      visibility: hidden;
    }

    /* --- THE 3D MAIN WRAPPER CONTAINER --- */
    .loader-wrapper-master {
      position: relative;
      width: 165px;
      height: 165px;
      display: flex;
      justify-content: center;
      align-items: center;
      transform-style: preserve-3d;
    }

    /* --- YOUR ORIGINAL 3D INNER WRAPPER --- */
    .loader-wrapper {
      position: absolute;
      width: 90px; 
      height: 90px;
      display: flex;
      justify-content: center;
      align-items: center;
      transform-style: preserve-3d;
      animation: global-spin 5s infinite linear;
    }

    /* --- GENERAL STYLE FOR ALL RINGS --- */
    .circle {
      position: absolute;
      border-radius: 50%;
      border: 3px dashed rgba(255, 255, 255, 0.9); 
      transform-style: preserve-3d;
    }

    /* --- ORIGINAL 3 RINGS --- */
    .loader-wrapper .circle {
      width: 100%;
      height: 100%;
    }
    .r-z { transform: rotateY(0deg); }
    .r-y { transform: rotateY(90deg); }
    .r-x { transform: rotateX(90deg); }

    /* --- RINGS 4 & 5 --- */
    .r-4-outer, .r-5-outer {
      width: 130px;
      height: 130px;
    }
    .r-4-outer {
      animation: spin-outer-horizontal 3.8s infinite linear;
    }
    .r-5-outer {
      animation: spin-outer-vertical 2.7s infinite linear;
    }

    /* --- RINGS 6 & 7 --- */
    .r-6-outer, .r-7-outer {
      width: 165px;
      height: 165px;
    }
    .r-6-outer {
      animation: rotate-flat-clockwise 4s infinite linear;
    }
    .r-7-outer {
      animation: rotate-flat-counter 3.2s infinite linear;
    }

    /* --- ENLARGED CENTRAL LOGO IMAGE --- */
    .logo {
      position: absolute;
      width: 65px; /* Increased from 45px to 65px for better prominence */
      height: auto;
      user-select: none;
      transform: translateZ(2px); 
      
      /* CSS Filter to seamlessly force any blue color into pure white */
      filter: brightness(0) invert(1);
    }

    /* --- KEYFRAME ANIMATIONS --- */
    @keyframes global-spin {
      0% { transform: rotateX(45deg) rotateY(0deg) rotateZ(0deg); }
      100% { transform: rotateX(45deg) rotateY(360deg) rotateZ(360deg); }
    }

    @keyframes spin-outer-horizontal {
      0% { transform: rotateX(15deg) rotateY(40deg); }
      100% { transform: rotateX(15deg) rotateY(400deg); }
    }

    @keyframes spin-outer-vertical {
      0% { transform: rotateY(-30deg) rotateX(85deg); }
      100% { transform: rotateY(-30deg) rotateX(445deg); }
    }

    @keyframes rotate-flat-clockwise {
      0% { transform: rotateX(45deg) rotateZ(0deg); }
      100% { transform: rotateX(45deg) rotateZ(360deg); }
    }

    @keyframes rotate-flat-counter {
      0% { transform: rotateY(45deg) rotateZ(360deg); }
      100% { transform: rotateY(45deg) rotateZ(0deg); }
    }

    /* --- TEST BUTTON --- */
    .test-btn {
      padding: 12px 24px;
      font-size: 1rem;
      font-weight: bold;
      color: #0b5fa5;
      background: white;
      border: 2px solid #0b5fa5;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="loader-container" id="loadingScreen">
    <div class="loader-wrapper-master">
      
      <div class="circle r-6-outer"></div>
      <div class="circle r-7-outer"></div>

      <div class="circle r-4-outer"></div>
      <div class="circle r-5-outer"></div>

      <div class="loader-wrapper">
        <div class="circle r-z"></div>
        <div class="circle r-y"></div>
        <div class="circle r-x"></div>
        
        <img src="assets/images/logo1.png" class="logo" alt="Logo">
      </div>

    </div>
  </div>

  <h1>Logo Dimension Increased!</h1>
  <br>
  <button class="test-btn" onclick="resetLoader()">Test Animation Again</button>

  <script>
    const loader = document.getElementById('loadingScreen');
    
    window.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => { loader.classList.add('hidden'); }, 3500); 
    });

    function resetLoader() {
      loader.classList.remove('hidden');
      setTimeout(() => { loader.classList.add('hidden'); }, 4000);
    }
  </script>

</body>
</html>
